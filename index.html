<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Path App + 动效复刻</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="scheme-3">
    <main class="page">
      <section class="phone-shell" aria-label="Path app plus animation recreation">
        <header class="status-bar" aria-label="iOS status bar">
          <div class="status-time">9:41</div>
          <div class="status-icons" aria-hidden="true">
            <span class="signal">
              <i></i><i></i><i></i><i></i>
            </span>
            <span class="wifi"></span>
            <span class="battery"><span class="battery-level"></span></span>
          </div>
        </header>

        <section class="content-area"></section>

        <div class="flyout-wrap">
          <button class="flyout-btn" type="button" aria-expanded="false" aria-label="Toggle action menu">
            <span class="flyout-gray-layer" aria-hidden="true"></span>
            <span class="flyout-plus-icon" aria-hidden="true"></span>
          </button>

          <ul class="flyout flyout-init" aria-label="Action menu">
            <li>
              <button type="button" aria-label="Records">
                <span class="option-bg" aria-hidden="true"></span>
                <span class="icon icon-camera" aria-hidden="true"></span>
                <span class="option-label">饮食</span>
              </button>
            </li>
            <li>
              <button type="button" aria-label="Mood">
                <span class="option-bg" aria-hidden="true"></span>
                <span class="icon icon-photo" aria-hidden="true"></span>
                <span class="option-label">心情</span>
              </button>
            </li>
            <li>
              <button type="button" aria-label="Question">
                <span class="option-bg" aria-hidden="true"></span>
                <span class="icon icon-music" aria-hidden="true"></span>
                <span class="option-label">体重</span>
              </button>
            </li>
            <li>
              <button type="button" aria-label="Medical">
                <span class="option-bg" aria-hidden="true"></span>
                <span class="icon icon-pin" aria-hidden="true"></span>
                <span class="option-label">症状</span>
              </button>
            </li>
          </ul>
        </div>

        <div class="input-dock">
          <img src="./assets/输入框.png" alt="输入框" class="input-image" />
        </div>

        <nav class="tabbar" aria-label="Bottom navigation">
          <img src="./assets/TabBar切图.png" alt="底部导航" class="tabbar-image" />
        </nav>

        <div class="home-indicator" aria-hidden="true"></div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
